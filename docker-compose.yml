version: "3.8"

services:
  db:
    image: mariadb:10.6
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: "frappe123"
      MYSQL_DATABASE: "frappe"
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped

  redis-socketio:
    image: redis:7-alpine
    restart: unless-stopped

  erpnext:
    image: frappe/erpnext:version-15
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: frappe
      DB_PASSWORD: "frappe123"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379
      SITE_NAME: site1.local
      FRAPPE_SITE: site1.local
    depends_on:
      - db
      - redis-cache
      - redis-queue
      - redis-socketio
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - logs-data:/home/frappe/frappe-bench/logs
	  - /docker/erpnext/changai:/home/frappe/frappe-bench/apps/changai
    restart: unless-stopped

  erpnext-worker:
    image: frappe/erpnext:version-15
    command: bench worker --queue default,short,long
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: frappe
      DB_PASSWORD: "frappe123"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379
    depends_on:
      - erpnext
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - logs-data:/home/frappe/frappe-bench/logs
	  - /docker/erpnext/changai:/home/frappe/frappe-bench/apps/changai
    restart: unless-stopped

  erpnext-scheduler:
    image: frappe/erpnext:version-15
    command: bench schedule
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: frappe
      DB_PASSWORD: "frappe123"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379
    depends_on:
      - erpnext
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - logs-data:/home/frappe/frappe-bench/logs
	  - /docker/erpnext/changai:/home/frappe/frappe-bench/apps/changai
    restart: unless-stopped

  reverse-proxy:
    image: nginx:alpine
    depends_on:
      - erpnext
    ports:
      - "68:80"
    command:
      - /bin/sh
      - -lc
      - |
          cat > /etc/nginx/conf.d/default.conf <<'EOF'
          server {
              listen 80;
              server_name _;
              client_max_body_size 100m;
              location / {
                  proxy_pass http://erpnext:8000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
                  proxy_set_header Upgrade $$http_upgrade;
                  proxy_set_header Connection "upgrade";
              }
          }
          EOF
          nginx -g 'daemon off;'
    restart: unless-stopped

volumes:
  db-data:
  redis-cache-data:
  redis-queue-data:
  redis-socketio-data:
  sites-data:
  logs-data:
